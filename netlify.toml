[build]
  command = "npm ci --include=dev && npm run build -w web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  included_files = ["packages/**", "prompts/**", "apps/web/prompts/**"]
  # Cron API routes use `export const maxDuration = 60` (same as verify / rss-watch).
  # If external callers still time out, raise their client timeout (e.g. cron-job.org ≥ 60s)
  # and/or raise Netlify: Site configuration → Functions → Function timeout (plan limits apply).
